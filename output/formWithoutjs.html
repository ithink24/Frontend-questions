<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Step Form (No JS)</title>

    <style>
      body {
        max-width: 500px;
        margin: 2rem auto;
        padding: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
      }

      /* Hide all steps by default */
      .step {
        display: none;
      }

      /* Hide radios */
      input[type="radio"] {
        display: none;
      }

      /* Show correct step based on checked input */
      /* This says: “If #step1 is checked, show .step1 inside the form”. */
      #step1:checked ~ form .step1,
      #step2:checked ~ form .step2,
      #step3:checked ~ form .step3 {
        display: block;
      }

      .buttons {
        margin-top: 1rem;
      }

      .buttons label {
        /* display: inline-block; */
        background: #007bff;
        color: white;
        padding: 0.5rem 1rem;
        margin: 0.25rem;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
      }

      button[type="submit"] {
        background: green;
        color: white;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- Step radios -->
    <input type="radio" name="step" id="step1" checked />
    <input type="radio" name="step" id="step2" />
    <input type="radio" name="step" id="step3" />

    <!-- Form -->
    <form action="#" method="POST">
      <!-- Step 1 -->
      <div class="step step1">
        <h2>Step 1: Your Info</h2>
        <label> Name: <input type="text" name="name" required /> </label>
        <div class="buttons">
          <!-- It "selects" the radio with id="step2". -->
          <!-- That triggers the CSS rules to show .step2 and hide others. -->
          <label for="step2">Next →</label>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="step step2">
        <h2>Step 2: Contact</h2>
        <label> Email: <input type="email" name="email" required /> </label>
        <div class="buttons">
          <label for="step1">← Back</label>
          <label for="step3">Next →</label>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="step step3">
        <h2>Step 3: Confirm</h2>
        <p>You're ready to submit the form.</p>
        <div class="buttons">
          <label for="step2">← Back</label>
          <button type="submit">Submit</button>
        </div>
      </div>
    </form>
  </body>
</html>
